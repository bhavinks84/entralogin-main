# EntraLogin – nginx.conf for Windows Server
# Full nginx.conf (Windows does not use sites-enabled/ includes)
#
# Placeholders replaced by deploy.ps1:
#   __DOMAIN__        → your domain or server hostname
#   __NGINX_PORT__    → the port nginx listens on (set during deploy.ps1 — NOT 80/443)
#   __FRONTEND_DIST__ → path to frontend/dist with forward slashes
#                       e.g. C:/Users/admin/entralogin/frontend/dist
#   __BACKEND_PORT__  → Express backend port (default 5000, internal only)
#
# After deploy.ps1 this file is written to: C:\nginx\conf\nginx.conf

# worker_processes must be 1 on Windows (no multi-worker fork support)
worker_processes 1;

error_log  logs/error.log;
pid        logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    # sendfile is unreliable on Windows — keep it off
    sendfile        off;
    tcp_nodelay     on;
    keepalive_timeout 65;

    access_log  logs/access.log;

    server {
        listen       __NGINX_PORT__;
        listen       [::]:__NGINX_PORT__;
        server_name  __DOMAIN__;

        # ── Static files (React SPA) ──────────────────────────────────────
        root  "__FRONTEND_DIST__";
        index index.html;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── API proxy to Express backend ──────────────────────────────────
        location /api {
            proxy_pass         http://127.0.0.1:__BACKEND_PORT__;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # ── SPA fallback ──────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Deny hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
        }
    }
}
